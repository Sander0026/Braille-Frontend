<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <title>Instituto Luiz Braille — ILBES</title>
  <meta name="description"
    content="Instituto de Educação Inclusiva Luiz Braille. Mais do que inclusão, transformação. Oferecendo oportunidades para pessoas com deficiência visual.">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- theme-color: amarelo ILBES — identidade visual consistente com a paleta oficial -->
  <meta name="theme-color" content="#f5c800">

  <!-- Ícone e PWA Manifest -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">

  <!-- Preconnect: inicia handshake DNS/TLS antecipado para Google Fonts (melhora LCP) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Fonte Inter — carregada aqui (HTML) para máxima prioridade de preload.
       A declaração @import em _base.scss foi removida para evitar request duplicado. -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Ícones Material Symbols -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet">

  <!-- Fontes para Assinaturas e Títulos de Certificados -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Parisienne&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&family=Montserrat:wght@400;700&family=Merriweather:wght@400;700&family=Cinzel:wght@400;700&family=Dancing+Script:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
</head>

<body>
  <!-- WCAG 2.1 SC 2.4.1: Skip-link para pular direto ao conteúdo principal.
       Aparece visivelmente apenas ao receber foco via Tab (estilo em _base.scss). -->
  <a class="skip-to-content" href="#main-content">Pular para o conteúdo principal</a>

  <app-root></app-root>

  <!-- VLibras: Plugin de acessibilidade em Libras (Governo Federal Brasileiro) -->
  <div vw class="enabled" aria-hidden="true">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    /* eslint-disable no-new */
    /* VLibras registra o widget via efeito colateral do construtor (API de terceiro) */
    new globalThis.VLibras.Widget('https://vlibras.gov.br/app');
  </script>
</body>

</html>

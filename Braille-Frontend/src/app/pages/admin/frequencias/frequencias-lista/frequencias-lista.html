<div id="freq-anuncio" aria-live="polite" class="sr-only"></div>

<div class="page-header">
    <div>
        <h1 class="page-title">Frequências</h1>
        <p class="page-subtitle">Registro de chamadas por oficina e data</p>
    </div>
</div>

<!-- ── Abas ──────────────────────────────────────────────── -->
<nav class="tabs-nav" role="tablist" aria-label="Seções de frequência">
    <button role="tab" class="tab-btn" [class.active]="abaAtiva() === 'chamada'"
        [attr.aria-selected]="abaAtiva() === 'chamada'" (click)="mudarAba('chamada')">
        <span class="material-symbols-rounded" aria-hidden="true">fact_check</span> Fazer Chamada
    </button>
    <button role="tab" class="tab-btn" [class.active]="abaAtiva() === 'historico'"
        [attr.aria-selected]="abaAtiva() === 'historico'" (click)="mudarAba('historico')">
        <span class="material-symbols-rounded" aria-hidden="true">history</span> Histórico
    </button>
    <button role="tab" class="tab-btn" [class.active]="abaAtiva() === 'relatorio'"
        [attr.aria-selected]="abaAtiva() === 'relatorio'" (click)="mudarAba('relatorio')">
        <span class="material-symbols-rounded" aria-hidden="true">monitoring</span> Relatório Individual
    </button>
</nav>

<!-- Erro transversal de turmas se houver -->
@if (erroCarregamento()) {
<div class="alert danger" role="alert">
    <span class="material-symbols-rounded" aria-hidden="true">error</span>
    {{ erroCarregamento() }}
</div>
}

<!-- Orquestração dos Micro-Frontends -->
<div class="aba-content" [ngSwitch]="abaAtiva()">

    <!-- ABA 1: Chamada Diária -->
    <app-frequencia-chamada 
        *ngSwitchCase="'chamada'" 
        [turmas]="turmas()">
    </app-frequencia-chamada>

    <!-- ABA 2: Histórico de Frequência -->
    <app-frequencia-historico 
        *ngSwitchCase="'historico'" 
        [turmas]="turmas()">
    </app-frequencia-historico>

    <!-- ABA 3: Regressão Estatística Individual -->
    <app-frequencia-relatorio 
        *ngSwitchCase="'relatorio'" 
        [turmas]="turmas()">
    </app-frequencia-relatorio>

</div>

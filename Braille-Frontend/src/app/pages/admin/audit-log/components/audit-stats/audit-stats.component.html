@if (stats) {
<div class="stats-grid">
    <div class="stat-card stat-total">
        <span class="stat-label">Total de Logs</span>
        <span class="stat-value">{{ stats.totalLogs | number }}</span>
    </div>
    <div class="stat-card stat-hoje">
        <span class="stat-label">Hoje</span>
        <span class="stat-value">{{ stats.logsHoje | number }}</span>
    </div>
    @for (item of stats.topAcoes.slice(0,3); track item.acao) {
    <div class="stat-card stat-acao">
        <span class="stat-label">{{ item.acao }}</span>
        <span class="stat-value">{{ item.total | number }}</span>
    </div>
    }
</div>
}

<div class="relative min-h-screen flex items-center justify-center bg-black overflow-hidden font-sans">

  <!-- Fundo com gradiente e blur (Efeito Premium) -->
  <div class="absolute inset-0 z-0">
    <div
      class="absolute -top-[30%] -left-[10%] w-[70vw] h-[70vw] rounded-full bg-yellow-500/10 blur-[120px] mix-blend-screen">
    </div>
    <div
      class="absolute -bottom-[30%] -right-[10%] w-[60vw] h-[60vw] rounded-full bg-yellow-600/10 blur-[100px] mix-blend-screen">
    </div>
  </div>

  <div class="relative z-10 w-full max-w-md px-6 py-12 lg:px-8">

    <!-- Header/Logo -->
    <div class="sm:mx-auto sm:w-full sm:max-w-md mb-8">
      <div class="flex justify-center flex-col items-center group cursor-default">
        <div
          class="relative flex items-center justify-center h-24 w-24 rounded-3xl bg-gradient-to-br from-yellow-400 to-yellow-600 shadow-2xl shadow-yellow-500/30 transition-transform duration-500 group-hover:scale-105 group-hover:rotate-3">
          <div class="absolute inset-0 rounded-3xl bg-white/20 blur-sm mix-blend-overlay"></div>
          <svg xmlns="http://www.w3.org/2000/svg" class="relative z-10 h-12 w-12 text-black" fill="none"
            viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        </div>
        <h2 class="mt-8 text-center text-4xl font-extrabold text-white tracking-tight">
          Bem-vindo de volta
        </h2>
        <p class="mt-2 text-center text-sm font-medium text-zinc-400 tracking-wide uppercase">
          Instituto Braille
        </p>
      </div>
    </div>

    <!-- Container do Formulário (Glassmorphism) -->
    <div
      class="bg-zinc-900/50 backdrop-blur-xl border border-white/10 py-10 px-6 shadow-2xl sm:rounded-3xl sm:px-12 transition-all hover:border-white/20">

      <!-- Mensagem de Erro UI Premium -->
      <div *ngIf="erroLogin"
        class="mb-6 rounded-xl bg-red-500/10 border border-red-500/20 p-4 transform transition-all animate-in fade-in slide-in-from-top-2">
        <div class="flex items-center">
          <svg class="h-5 w-5 text-red-400 mr-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
            fill="currentColor">
            <path fill-rule="evenodd"
              d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
              clip-rule="evenodd" />
          </svg>
          <p class="text-sm font-medium text-red-200">{{ erroLogin }}</p>
        </div>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="fazerLogin()" class="space-y-6">

        <!-- Input Usuário -->
        <div class="group">
          <label for="username"
            class="block text-sm font-medium text-zinc-400 mb-2 group-focus-within:text-yellow-400 transition-colors">
            Usuário
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-zinc-500 group-focus-within:text-yellow-400 transition-colors"
                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input type="text" id="username" formControlName="username"
              class="block w-full pl-12 pr-4 py-3.5 bg-black/40 border border-white/10 rounded-2xl text-white placeholder-zinc-600 focus:outline-none focus:ring-1 focus:ring-yellow-400 focus:border-yellow-400 sm:text-sm transition-all shadow-inner"
              placeholder="Digite seu usuário">
          </div>
        </div>

        <!-- Input Senha -->
        <div class="group">
          <label for="senha"
            class="block text-sm font-medium text-zinc-400 mb-2 group-focus-within:text-yellow-400 transition-colors">
            Senha
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-zinc-500 group-focus-within:text-yellow-400 transition-colors"
                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input type="password" id="senha" formControlName="senha"
              class="block w-full pl-12 pr-4 py-3.5 bg-black/40 border border-white/10 rounded-2xl text-white placeholder-zinc-600 focus:outline-none focus:ring-1 focus:ring-yellow-400 focus:border-yellow-400 sm:text-sm transition-all shadow-inner"
              placeholder="••••••••">
          </div>
        </div>

        <!-- Opções Extras -->
        <div class="flex items-center justify-between pt-2">
          <div class="flex items-center group/check">
            <input id="remember-me" name="remember-me" type="checkbox"
              class="h-4 w-4 bg-black/40 border-white/20 rounded text-yellow-500 focus:ring-yellow-500 focus:ring-offset-zinc-900 transition-all cursor-pointer">
            <label for="remember-me"
              class="ml-2.5 block text-sm text-zinc-400 group-hover/check:text-zinc-300 transition-colors cursor-pointer select-none">
              Lembrar-me
            </label>
          </div>

          <div class="text-sm">
            <a href="#" class="font-medium text-zinc-400 hover:text-yellow-400 transition-colors">
              Esqueceu a senha?
            </a>
          </div>
        </div>

        <!-- Botão Submit Premium -->
        <div class="pt-4">
          <button type="submit" [disabled]="loginForm.invalid || carregando"
            class="relative w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-2xl text-sm font-semibold text-black bg-gradient-to-r from-yellow-400 to-yellow-500 hover:from-yellow-300 hover:to-yellow-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-zinc-900 focus:ring-yellow-400 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 shadow-[0_0_20px_rgba(250,204,21,0.2)] hover:shadow-[0_0_25px_rgba(250,204,21,0.4)] overflow-hidden group/btn">

            <!-- Efeito de brilho no botão -->
            <div
              class="absolute inset-0 w-full h-full bg-white/20 translate-x-[-100%] group-hover/btn:translate-x-[100%] transition-transform duration-700 ease-out skew-x-[30deg]">
            </div>

            <svg *ngIf="carregando" class="animate-spin -ml-1 mr-3 h-5 w-5 text-black relative z-10"
              xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>
            <span class="relative z-10 tracking-wide">{{ carregando ? 'Autenticando...' : 'Entrar' }}</span>
          </button>
        </div>
      </form>
    </div>

  </div>
</div>

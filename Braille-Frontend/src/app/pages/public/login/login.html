<div class="min-h-screen bg-black flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans selection:bg-yellow-400 selection:text-black">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <!-- Logo ou Ícone Braille -->
    <div class="flex justify-center">
      <div class="h-20 w-20 bg-yellow-400 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(250,204,21,0.3)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
      </div>
    </div>
    
    <h2 class="mt-6 text-center text-4xl font-extrabold text-yellow-400 tracking-tight">
      Acesso Restrito
    </h2>
    <p class="mt-2 text-center text-xl text-gray-300">
      Instituto Braille
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-zinc-900 py-8 px-4 shadow-2xl shadow-yellow-400/10 sm:rounded-2xl sm:px-10 border border-zinc-800">
      
      <!-- Mensagem de Erro com Alto Contraste -->
      <div *ngIf="erroLogin" class="mb-6 bg-red-900 border-l-4 border-red-500 p-4" role="alert" aria-live="assertive">
        <div class="flex">
          <div class="flex-shrink-0">
            <svg class="h-6 w-6 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
            </svg>
          </div>
          <div class="ml-3">
            <p class="text-base text-red-200 font-medium">
              {{ erroLogin }}
            </p>
          </div>
        </div>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="fazerLogin()" class="space-y-7">
        
        <div>
          <label for="username" class="block text-lg font-medium text-yellow-400">
            Usuário
          </label>
          <div class="mt-2 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-6 w-6 text-zinc-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input 
              type="text" 
              id="username" 
              formControlName="username" 
              class="block w-full pl-11 pr-3 py-4 border-2 border-zinc-700 bg-black text-white rounded-xl focus:outline-none focus:ring-4 focus:ring-yellow-400 focus:border-yellow-400 sm:text-lg transition-colors placeholder-zinc-500" 
              placeholder="Digite seu usuário"
              aria-label="Usuário"
              aria-required="true">
          </div>
        </div>

        <div>
          <label for="senha" class="block text-lg font-medium text-yellow-400">
            Senha
          </label>
          <div class="mt-2 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-6 w-6 text-zinc-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input 
              type="password" 
              id="senha" 
              formControlName="senha" 
              class="block w-full pl-11 pr-3 py-4 border-2 border-zinc-700 bg-black text-white rounded-xl focus:outline-none focus:ring-4 focus:ring-yellow-400 focus:border-yellow-400 sm:text-lg transition-colors placeholder-zinc-500" 
              placeholder="Sua senha secreta"
              aria-label="Senha"
              aria-required="true">
          </div>
        </div>

        <div class="flex items-center justify-between mt-4">
          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox" class="h-5 w-5 bg-black border-zinc-600 rounded text-yellow-400 focus:ring-yellow-400 focus:ring-offset-zinc-900 focus:ring-offset-2">
            <label for="remember-me" class="ml-3 block text-base text-gray-300">
              Lembrar acesso
            </label>
          </div>

          <div class="text-base">
            <a href="#" class="font-medium text-yellow-400 hover:text-yellow-300 focus:outline-none focus:underline focus:text-yellow-300 transition-colors">
              Esqueceu a senha?
            </a>
          </div>
        </div>

        <div>
          <button 
            type="submit" 
            [disabled]="loginForm.invalid || carregando"
            class="w-full flex justify-center py-4 px-4 border border-transparent rounded-xl shadow-lg text-xl font-bold text-black bg-yellow-400 hover:bg-yellow-300 focus:outline-none focus:ring-4 focus:ring-offset-2 focus:ring-offset-zinc-900 focus:ring-yellow-400 disabled:opacity-50 disabled:cursor-not-allowed transition-all transform hover:-translate-y-1 hover:shadow-yellow-400/40">
            <svg *ngIf="carregando" class="animate-spin -ml-1 mr-3 h-6 w-6 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            {{ carregando ? 'Autenticando...' : 'Entrar no Sistema' }}
          </button>
        </div>
      </form>
    </div>
    
    <!-- Footer de Acessibilidade -->
    <div class="mt-8 text-center text-sm text-zinc-500">
      <p>Otimizado para leitores de tela e navegação por teclado.</p>
      <p class="mt-1">Pressione <kbd class="px-2 py-1 bg-zinc-800 text-yellow-400 rounded-md border border-zinc-700 font-mono text-xs">Tab</kbd> para navegar.</p>
    </div>
  </div>
</div>

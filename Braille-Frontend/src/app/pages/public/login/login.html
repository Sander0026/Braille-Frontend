<div class="login-container">
  <div class="login-box">
    
    <header class="login-header">
      <h1>Acesso Restrito</h1>
      <p>Sistema de Gestão - Instituto Braille</p>
    </header>

    <div *ngIf="erroLogin" class="alert-error" role="alert">
      ⚠️ {{ erroLogin }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="fazerLogin()">
      
      <div class="form-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" formControlName="username" placeholder="Digite seu usuário de acesso">
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" formControlName="senha" placeholder="Sua senha secreta">
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || carregando">
        {{ carregando ? 'Autenticando...' : 'Entrar no Sistema' }}
      </button>

    </form>
  </div>
</div>

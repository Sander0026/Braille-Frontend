<div class="min-h-screen bg-black flex flex-col lg:flex-row font-sans text-white overflow-hidden">

  <!-- Lado Esquerdo (Banner de Identidade Visual - Fundo Amarelo) -->
  <div
    class="relative w-full lg:w-1/2 flex flex-col justify-center items-center bg-yellow-400 p-8 pt-16 lg:p-20 overflow-hidden flex-shrink-0">
    <!-- Grafismos de fundo para não ficar totalmente liso -->
    <div
      class="absolute top-0 right-0 w-64 h-64 bg-yellow-300 rounded-full mix-blend-multiply filter blur-3xl opacity-50 transform translate-x-1/2 -translate-y-1/2">
    </div>
    <div
      class="absolute bottom-0 left-0 w-80 h-80 bg-orange-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 transform -translate-x-1/3 translate-y-1/3">
    </div>

    <div class="relative z-10 text-center lg:text-left flex flex-col justify-center w-full max-w-md mx-auto h-full">
      <div
        class="w-20 h-20 sm:w-24 sm:h-24 bg-black rounded-3xl flex items-center justify-center mb-8 mx-auto lg:mx-0 shadow-2xl transform transition-transform duration-500 hover:-translate-y-2 hover:rotate-3">
        <!-- Ícone / Logo do Instituto (Pontos representando braille estilizado) -->
        <svg class="w-10 h-10 sm:w-12 sm:h-12 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
          <circle cx="6" cy="6" r="2.5"></circle>
          <circle cx="6" cy="12" r="2.5"></circle>
          <circle cx="6" cy="18" r="2.5"></circle>
          <circle cx="12" cy="6" r="2.5"></circle>
          <circle cx="18" cy="12" r="2.5"></circle>
          <circle cx="12" cy="18" r="2.5"></circle>
        </svg>
      </div>
      <h1
        class="text-4xl sm:text-5xl lg:text-6xl font-black text-black leading-tight tracking-tighter mb-4 sm:mb-6 uppercase">
        Instituto<br />Braille
      </h1>
      <p class="text-black/80 font-semibold text-base sm:text-lg lg:text-xl max-w-sm mx-auto lg:mx-0">
        Acesso restrito ao painel administrativo.
      </p>
    </div>
  </div>

  <!-- Lado Direito (Área de Login - Fundo Preto) -->
  <div
    class="relative w-full lg:w-1/2 flex flex-col justify-center items-center p-6 sm:p-12 lg:p-24 bg-black min-h-[60vh] lg:min-h-screen flex-grow">

    <!-- Reflexo sutil nas bordas -->
    <div
      class="absolute inset-y-0 left-0 w-px bg-gradient-to-b from-transparent via-yellow-400/20 to-transparent lg:block hidden">
    </div>

    <div class="w-full max-w-md relative z-10">
      <div class="mb-10 text-center lg:text-left">
        <h2 class="text-3xl sm:text-4xl font-extrabold text-white mb-2 tracking-tight">Entrar</h2>
        <p class="text-zinc-500 font-medium">Insira suas credenciais para continuar</p>
      </div>

      <!-- Alerta de Erro -->
      <div *ngIf="erroLogin"
        class="mb-8 p-4 bg-zinc-900 border border-yellow-400/50 rounded-xl flex items-start shadow-lg transform transition-all animate-in fade-in slide-in-from-top-2">
        <svg class="w-6 h-6 text-yellow-400 mr-3 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <p class="text-yellow-400 font-medium text-sm sm:text-base leading-snug">{{ erroLogin }}</p>
      </div>

      <!-- Formulário com Angular bindings intactos -->
      <form [formGroup]="loginForm" (ngSubmit)="fazerLogin()" class="space-y-6">

        <!-- Campo: Usuário -->
        <div class="space-y-2">
          <label for="username"
            class="block text-xs sm:text-sm font-bold text-zinc-400 uppercase tracking-widest ml-1">Usuário</label>
          <div class="relative group">
            <input type="text" id="username" formControlName="username"
              class="w-full bg-zinc-900/50 border-2 border-zinc-800 rounded-2xl px-5 py-4 pl-14 text-white placeholder-zinc-600 focus:outline-none focus:border-yellow-400 focus:bg-zinc-900 transition-all duration-300 text-base shadow-inner"
              placeholder="Digite seu usuário">
            <div
              class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-600 group-focus-within:text-yellow-400 transition-colors">
              <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
          </div>
        </div>

        <!-- Campo: Senha -->
        <div class="space-y-2">
          <label for="senha"
            class="block text-xs sm:text-sm font-bold text-zinc-400 uppercase tracking-widest ml-1">Senha</label>
          <div class="relative group">
            <input type="password" id="senha" formControlName="senha"
              class="w-full bg-zinc-900/50 border-2 border-zinc-800 rounded-2xl px-5 py-4 pl-14 text-white placeholder-zinc-600 focus:outline-none focus:border-yellow-400 focus:bg-zinc-900 transition-all duration-300 text-base shadow-inner"
              placeholder="••••••••">
            <div
              class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-600 group-focus-within:text-yellow-400 transition-colors">
              <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
          </div>
        </div>

        <!-- Checkbox & Esqueceu Senha -->
        <div class="flex items-center justify-between pt-2">
          <label class="flex items-center cursor-pointer group">
            <div
              class="relative flex items-center justify-center w-5 h-5 bg-zinc-900 border-2 border-zinc-700 rounded mr-3 flex-shrink-0 group-hover:border-yellow-400 transition-colors">
              <input type="checkbox" class="absolute opacity-0 w-full h-full cursor-pointer peer">
              <svg class="w-3 h-3 text-black opacity-0 peer-checked:opacity-100 transition-opacity" fill="none"
                stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
              </svg>
              <div
                class="absolute inset-0 bg-yellow-400 rounded-sm opacity-0 peer-checked:opacity-100 -z-10 transition-opacity">
              </div>
            </div>
            <span class="text-sm font-medium text-zinc-400 group-hover:text-zinc-300 transition-colors">Lembrar
              acesso</span>
          </label>
          <a href="#" class="text-sm font-bold text-zinc-500 hover:text-yellow-400 transition-colors">Esqueci a
            senha</a>
        </div>

        <!-- Botão Submit -->
        <div class="pt-6">
          <button type="submit" [disabled]="loginForm.invalid || carregando"
            class="w-full bg-yellow-400 text-black font-extrabold text-base sm:text-lg py-4 sm:py-5 rounded-2xl hover:bg-yellow-300 focus:outline-none focus:ring-4 focus:ring-yellow-400/30 active:scale-[0.98] disabled:opacity-40 disabled:hover:bg-yellow-400 disabled:active:scale-100 disabled:cursor-not-allowed transition-all duration-300 flex justify-center items-center overflow-hidden relative group">

            <span
              class="absolute w-0 h-0 transition-all duration-500 ease-out bg-black rounded-full group-hover:w-full group-hover:h-56 opacity-10"></span>

            <svg *ngIf="carregando" class="animate-spin -ml-2 mr-3 h-6 w-6 text-black relative z-10"
              xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>

            <span
              class="relative z-10 tracking-wider uppercase group-hover:tracking-[0.2em] transition-all duration-300">{{
              carregando ? 'Acessando...' : 'Acessar Plataforma' }}</span>
          </button>
        </div>

      </form>
    </div>

  </div>
</div>

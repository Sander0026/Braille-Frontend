<div class="min-h-[80vh] flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-slate-200">
    
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-blue-600 mb-2">Acesso Restrito</h2>
      <p class="text-slate-500">Insira suas credenciais para gerenciar o sistema.</p>
    </div>

    <div *ngIf="mensagemErro" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded">
      <p>{{ mensagemErro }}</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="fazerLogin()" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Usuário</label>
        <input type="text" formControlName="username" placeholder="Nome de usuario" 
               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
        <input type="password" formControlName="senha" placeholder="••••••••" 
               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
      </div>

      <button type="submit" [disabled]="loginForm.invalid"
              class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-bold py-3 rounded-lg shadow transition-colors">
        Entrar no Sistema
      </button>
    </form>
    
  </div>
</div>

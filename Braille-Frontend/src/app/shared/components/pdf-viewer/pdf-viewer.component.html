@if (urlVisualizadorPdf()) {
  <header class="pdf-viewer-header">
    <h3 id="pdf-viewer-title">Visualizador Interativo de Documento</h3>
    <button 
      (click)="onClose()" 
      class="btn-close"
      aria-label="Encerrar visualização do documento e fechar o modal"
      title="Fechar janela">
      <span aria-hidden="true">&times;</span>
    </button>
  </header>

  <!-- RENDERIZAÇÃO ESTRITA E ISOLADA -->
  <!-- A classe style force garante a preservação do limite Flex -->
  <div style="flex: 1; position: relative; width: 100%; min-height: 0; display: block; overflow: hidden; background-color: #f9fafb;">
    <!-- Renderização Nativa e Segura com absolute binding para curar o Flex-1 Canvas Bug dos browsers -->
    <iframe 
      [src]="urlVisualizadorPdf() | safeUrl" 
      style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;"
      title="Visualização Interna de Arquivo PDF">
    </iframe>
  </div>
}

<div class="p-6">
  <h2 class="text-2xl font-bold mb-4">Detalhes do Beneficiário</h2>

  <button 
    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
    (click)="abrirPdf(termoLgpdMock)">
    Visualizar Termo LGPD
  </button>

  <div *ngIf="urlVisualizadorPdf" class="mt-8 border rounded-lg shadow-lg overflow-hidden bg-white">
    
    <div class="bg-gray-800 text-white flex justify-between items-center p-3">
      <span class="font-semibold">Visualizador de Documento</span>
      <button 
        (click)="fecharPdf()" 
        class="text-red-400 hover:text-red-300 font-bold text-xl px-2">
        &times;
      </button>
    </div>

    <iframe 
      [src]="urlVisualizadorPdf | safeUrl" 
      width="100%" 
      height="600px" 
      frameborder="0"
      title="Visualizador de Documento PDF">
    </iframe>

  </div>
</div>

<div class="p-6">
  <h2 class="text-2xl font-bold mb-4">Detalhes do Beneficiário</h2>

  <!-- Acesso WCAG Garantido nos atributos Focus Ring e Botão -->
  <button 
    #btnTermoLgpd
    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-200 focus:outline-none focus:ring-4 focus:ring-blue-300 active:bg-blue-800 shadow-md"
    (click)="abrirPdf()"
    [attr.aria-expanded]="exibirTermo"
    aria-controls="modal-lgpd-viewer">
    <span class="flex items-center gap-2">
      <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
        <polyline points="10 9 9 9 8 9"></polyline>
      </svg>
      Visualizar Termo LGPD
    </span>
  </button>

  <!-- Import do Componente de UI Genérico e Encapsulado -->
  <div *ngIf="exibirTermo" id="modal-lgpd-viewer" class="mt-6 animation-fade-in">
    <app-pdf-viewer 
      [url]="termoLgpdMock" 
      (closed)="fecharPdf()">
    </app-pdf-viewer>
  </div>
</div>

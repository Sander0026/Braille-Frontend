<div class="public-shell">
  <a href="#conteudo-principal" class="skip-to-content">Ir para o conteúdo principal</a>

  <app-header 
    theme="public" 
    [isMobileMenuOpen]="isMobileMenuOpen" 
    (mobileMenuToggle)="toggleMobileMenu()" 
    (closeMobile)="closeMobileMenu()">
  </app-header>

  <main id="conteudo-principal" tabindex="-1">
    <router-outlet></router-outlet>
  </main>

  <!-- ── Botão Flutuante "Fale Conosco" ── -->
  <a routerLink="/contato" class="floating-cta" aria-label="Fale Conosco">
    <span class="floating-cta-text">Fale Conosco</span>
  </a>

  <app-footer theme="public"></app-footer>
</div><!-- /.public-shell -->

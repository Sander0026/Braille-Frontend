<dialog class="modal-overlay" open aria-modal="true" aria-labelledby="modal-foto-titulo" 
  (click)="onBackdropClick($event)" (keydown.escape)="fecharModal()" cdkTrapFocus [cdkTrapFocusAutoCapture]="true">
  <div class="modal-card">

    <div class="modal-header">
      <h2 id="modal-foto-titulo" class="modal-title">Trocar Foto de Perfil</h2>
      <button class="modal-close" (click)="fecharModal()" aria-label="Fechar modal">
        <span class="material-symbols-rounded">close</span>
      </button>
    </div>

    <div class="modal-body">
      <!-- Preview -->
      <div class="foto-preview-area">
        @if (fotoPreview) {
        <img [src]="fotoPreview" class="foto-preview-img" alt="Pré-visualização da nova foto" />
        } @else if (fotoPerfil && !removerFotoFlag) {
        <img [src]="fotoPerfil" class="foto-preview-img" alt="Foto atual" />
        } @else {
        <div class="foto-preview-placeholder">
          <span class="material-symbols-rounded">person</span>
        </div>
        }
      </div>

      <!-- Controles de Seleção / Remoção -->
      <div class="action-grid">
        <button type="button" class="foto-upload-btn" (click)="inputFoto.click()">
          <span class="material-symbols-rounded" aria-hidden="true">upload</span>
          @if (fotoSelecionada) { Alterar } @else { Selecionar foto }
        </button>
        
        @if (fotoPerfil && !removerFotoFlag) {
        <button class="btn btn-secondary btn-remover" (click)="marcarParaRemoverFoto()" title="Remover minha foto atual">
          <span class="material-symbols-rounded" aria-hidden="true">delete</span>
          Remover
        </button>
        }
      </div>
      <input #inputFoto id="input-foto" type="file" accept="image/jpeg,image/png,image/webp" style="display: none;"
        (change)="onFotoSelecionada($event)" />

      <p class="foto-hint">Formatos: JPG, PNG, WebP. Máx: 2 MB.</p>

      @if (fotoErro) {
      <p class="form-error" role="alert">{{ fotoErro }}</p>
      }
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" (click)="salvarFoto()" [disabled]="(!fotoSelecionada && !removerFotoFlag) || carregandoFoto">
        @if (carregandoFoto) { Salvando... } @else { Salvar Alterações }
      </button>
    </div>

  </div>
</dialog>

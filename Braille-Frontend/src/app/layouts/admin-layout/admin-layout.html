<!-- Skip to Content -->
<a href="#main-content" class="skip-to-content">Pular para o conteúdo principal</a>

<div class="admin-shell" [class.sidebar-full]="sidebarState === 'full'" [class.sidebar-icons]="sidebarState === 'icons'"
  [class.sidebar-hidden]="sidebarState === 'hidden'">

  <!-- ══ SIDEBAR ══════════════════════════════════════════════ -->
  <app-sidebar
    [sidebarState]="sidebarState"
    [showLabels]="showLabels"
    [rotasPermitidas]="rotasPermitidas"
    (action)="onHeaderAction($event)">
  </app-sidebar>

  <!-- ══ ÁREA PRINCIPAL ════════════════════════════════════════ -->
  <div class="main-area">

    <!-- Header Corporativo -->
    <app-header 
      theme="admin"
      [nomeDisplay]="nomeDisplay"
      [fotoPerfil]="fotoPerfil"
      [iniciaisDisplay]="iniciaisDisplay"
      [labelCargo]="labelCargo"
      [perfilEmail]="perfil?.email"
      [sidebarState]="sidebarState"
      [toggleIcon]="toggleIcon"
      [toggleLabel]="toggleLabel"
      (sidebarToggle)="toggleSidebar()"
      (userAction)="onHeaderAction($event)">
    </app-header>

    <!-- Conteúdo das páginas -->
    <main id="main-content" class="page-content" role="main" tabindex="-1">
      <router-outlet></router-outlet>
    </main>

    <app-footer theme="admin"></app-footer>
  </div>

</div>

<!-- ══ SUB-COMPONENTES DE MODAL ═══════════════════════════════════════ -->

@if (modalAtivo === 'foto') {
  <app-modal-foto
    [fotoPerfil]="fotoPerfil"
    (close)="fecharModal()"
    (fotoAtualizada)="onFotoAtualizada($event)">
  </app-modal-foto>
}

@if (modalAtivo === 'senha') {
  <app-modal-senha
    (close)="fecharModal()">
  </app-modal-senha>
}

@if (modalAtivo === 'perfil') {
  <app-modal-perfil
    [perfil]="perfil"
    [usuario]="usuario"
    [fotoPerfil]="fotoPerfil"
    [nomeDisplay]="nomeDisplay"
    [iniciaisDisplay]="iniciaisDisplay"
    [labelCargo]="labelCargo"
    (close)="fecharModal()"
    (action)="handlePerfilAction($event)"
    (perfilAtualizado)="onPerfilAtualizado($event)">
  </app-modal-perfil>
}

@if (modalAtivo === 'hotkeys') {
  <app-modal-hotkeys
    [hotkeysDisponiveis]="hotkeysDisponiveis"
    (close)="fecharModal()">
  </app-modal-hotkeys>
}

<!-- Modal de Confirmaçao Global (disponivel em qualquer area do painel admin) -->
<app-confirm-dialog></app-confirm-dialog>

<!-- Toaster de Feedback Global -->
<app-toast></app-toast>

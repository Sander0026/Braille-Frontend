<!-- Skip to Content — Acessibilidade de teclado -->
<a href="#main-content" class="skip-to-content">Pular para o conteúdo principal</a>

<div class="admin-shell" [class.sidebar-collapsed]="!isSidebarOpen">

  <!-- ══ SIDEBAR ══════════════════════════════════════════════ -->
  <aside class="sidebar" role="navigation" aria-label="Menu principal de administração"
    [attr.aria-expanded]="isSidebarOpen">
    <!-- Logo -->
    <div class="sidebar-logo" aria-hidden="true">
      <div class="logo-mark">IB</div>
      @if (isSidebarOpen) {
      <span class="logo-text">Instituto Luiz Braille</span>
      }
    </div>

    <!-- Navegação -->
    <ul class="sidebar-nav" role="list">
      @for (item of navItems; track item.rota) {
      <li role="listitem">
        <a [routerLink]="item.rota" routerLinkActive="active" [attr.aria-label]="item.aria" class="nav-link">
          <span class="material-symbols-rounded nav-icon" aria-hidden="true">{{ item.icon }}</span>
          @if (isSidebarOpen) {
          <span class="nav-label">{{ item.label }}</span>
          }
        </a>
      </li>
      }
    </ul>

    <!-- Botão Sair -->
    <div class="sidebar-footer">
      <button class="nav-link sair-btn" (click)="sair()" aria-label="Sair da conta e ir para login">
        <span class="material-symbols-rounded nav-icon" aria-hidden="true">logout</span>
        @if (isSidebarOpen) {
        <span class="nav-label">Sair</span>
        }
      </button>
    </div>
  </aside>

  <!-- ══ ÁREA PRINCIPAL ════════════════════════════════════════ -->
  <div class="main-area">

    <!-- Header -->
    <header class="admin-header" role="banner">
      <button class="toggle-btn" (click)="toggleSidebar()"
        [attr.aria-label]="isSidebarOpen ? 'Recolher menu lateral' : 'Expandir menu lateral'"
        [attr.aria-expanded]="isSidebarOpen">
        <span class="material-symbols-rounded" aria-hidden="true">menu</span>
      </button>

      <div class="header-right">
        <!-- Info do usuário logado -->
        <div class="user-info" aria-label="Usuário logado">
          <div class="user-avatar" aria-hidden="true">{{ iniciais }}</div>
          <div class="user-details">
            <span class="user-nome">{{ usuario?.username ?? 'Usuário' }}</span>
            <span class="user-cargo">{{ labelCargo }}</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Conteúdo das páginas -->
    <main id="main-content" class="page-content" role="main" aria-label="Conteúdo da página" tabindex="-1">
      <router-outlet />
    </main>
  </div>

</div>
